# PathFusion example configuration

[tools]
katana = "katana"
dirsearch = "dirsearch"
feroxbuster = "feroxbuster"

default_proxy = ""
insecure_tls = true

default_wordlists = [
  "./wordlists/common.txt",
]

default_extensions = ["php", "txt", "html", "json", "bak"]

host_allow_patterns = []
host_deny_patterns = []

selective_recursion = true
max_dirsearch_paths_per_host = 20
max_ferox_paths_per_host = 10
ferox_score_threshold = 6.0

[weights]
cross_tool_bonus = 3.0
baseline_bonus = 2.0
depth_factor = 0.3

[weights.keyword_weights]
admin = 3.0
internal = 3.0
backup = 4.0
old = 2.0
dev = 2.5
test = 2.0
private = 3.0
config = 3.5
export = 2.5
swagger = 3.0
openapi = 3.0
upload = 2.0
api = 1.5

[weights.extension_weights]
env = 5.0
bak = 4.0
sql = 4.0
zip = 3.0
json = 1.5
yml = 2.0
yaml = 2.0
log = 2.5
txt = 1.0
conf = 3.0

[weights.status_weights]
200 = 2.0
204 = 1.5
301 = 1.0
302 = 1.0
401 = 2.5
403 = 2.5
